<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPSU Career+</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background-color: #0b0f19; /* Deep dark site background */
            font-family: 'Poppins', sans-serif;
            color: #e5e7eb;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- THE PREMIUM SIDEBAR (Now Deep Dark Blue!) --- */
        #sidebar {
            width: 260px;
            background: #0f172a; /* Deepest Navy Blue to stand out */
            color: #fff;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1040;
            border-right: 1px solid #1e293b;
            box-shadow: 4px 0 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease-in-out;
        }
        
        /* The class that hides the sidebar */
        #sidebar.hidden {
            transform: translateX(-100%);
        }

        /* FLAT GLOWING LOGO */
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }
        .logo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            background: #1e293b;
            padding: 5px;
            /* Static beautiful glow */
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            transition: box-shadow 0.3s ease;
        }
        .logo-container:hover {
            /* Glow gets slightly brighter on hover */
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.8), inset 0 0 10px rgba(99, 102, 241, 0.4);
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .brand-text {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ffffff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sidebar Navigation Links */
        #sidebar ul.components { padding: 20px 0; }
        #sidebar ul li a {
            padding: 15px 25px;
            font-size: 1rem;
            display: block;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }
        #sidebar ul li a:hover, #sidebar ul li a.active {
            color: #ffffff;
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid #6366f1;
        }
        #sidebar ul li a i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
            color: #818cf8;
            font-size: 1.1rem;
        }

        /* --- MAIN CONTENT WRAPPER --- */
        #main-content {
            width: calc(100% - 260px);
            margin-left: 260px;
            min-height: 100vh;
            transition: margin-left 0.3s ease-in-out, width 0.3s ease-in-out;
        }
        
        /* The class that expands main content when sidebar hides */
        #main-content.expanded {
            width: 100%;
            margin-left: 0;
        }

        /* --- GLASSMORPHISM TOP NAVBAR --- */
        .navbar {
            background: rgba(11, 15, 25, 0.85) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f2937;
            padding: 12px 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 1030; 
        }
        
        /* Fixed Hamburger Button */
        #sidebarCollapse {
            background: #1f2937;
            border: 1px solid #374151;
            color: #818cf8;
            box-shadow: none;
            transition: 0.3s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
        }
        #sidebarCollapse:hover { background: #374151; color: #ffffff; border-color: #6366f1; }
        
        /* White background wrapper for the header logo so black text is visible */
        .header-logo-wrapper {
            background-color: #ffffff;
            padding: 5px 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .header-logo {
            height: 40px;
            object-fit: contain;
        }

        /* Dark Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050811; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/ppsu_logo.jpg') }}" alt="PPSU" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <i class="fas fa-graduation-cap fa-2x" style="display: none; color: #818cf8; line-height: 80px;"></i>
            </div>
            <h5 class="mt-3 brand-text">PPSU Career+</h5>
        </div>

    <ul class="list-unstyled components" id="nav-links">
        <li><a href="/" class="sidebar-link" onclick="window.speechSynthesis.cancel();"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="/dashboard" class="sidebar-link" onclick="window.speechSynthesis.cancel();"><i class="fas fa-th-large"></i> Dashboard</a></li>
        <li><a href="/jobs" class="sidebar-link" onclick="window.speechSynthesis.cancel();"><i class="fas fa-satellite-dish"></i> JobFit Engine</a></li>
        <li><a href="/trainer" class="sidebar-link" onclick="window.speechSynthesis.cancel();"><i class="fas fa-robot"></i> AI Trainer</a></li>
        <li><a href="/build_resume" class="sidebar-link" onclick="window.speechSynthesis.cancel();"><i class="fas fa-file-code"></i> Build Resume</a></li>
    </ul>

    </nav>

    <div id="main-content">
        
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container-fluid p-0">
                
                <button type="button" id="sidebarCollapse" class="btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>

                <div class="ms-auto d-flex align-items-center">
                    <div class="header-logo-wrapper">
                        <img src="{{ url_for('static', filename='images/ppsu_header.jpg') }}" 
                            alt="PPSU Banner" 
                            class="header-logo"
                            onerror="this.style.display='none'"> 
                    </div>
                </div>
            </div>
        </nav>

        <div class="content-wrapper p-0">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    
    <script>
        // 1. COMPLETELY REWRITTEN SIDEBAR TOGGLE
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            
            sidebar.classList.toggle('hidden');
            mainContent.classList.toggle('expanded');
        }

        // 2. AUTO-HIGHLIGHT CURRENT SIDEBAR TAB
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('#nav-links a');
            
            navLinks.forEach(link => {
                const linkPath = link.getAttribute('href');
                if (linkPath === currentPath) {
                    link.classList.add('active');
                } else if (currentPath.includes('/job/') && linkPath === '/jobs') {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

</body>
</html>
